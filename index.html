<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fouad Cyber Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* 🎬 VIDEO BACKGROUND */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #00ffd5;
}

.logo{
  color:#00ffd5;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:40px;
  color:#00ffd5;
  text-shadow:0 0 20px #00ffd5,0 0 40px #00aaff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(20,20,20,0.7);
  border:1px solid #00ffd5;
  border-radius:14px;
  padding:18px;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  left:-100%;
  top:0;
  background:linear-gradient(90deg,transparent,rgba(0,255,213,0.3),transparent);
  transition:0.5s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px #00ffd5;
}

/* BUTTON */
.btn{
  display:block;
  width:240px;
  margin:30px auto;
  text-align:center;
  padding:14px;
  background:linear-gradient(90deg,#00ffd5,#00aaff);
  color:black;
  font-weight:bold;
  text-decoration:none;
  border-radius:12px;
}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(90deg,#00ffd5,#00aaff);
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 15px #00ffd5;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  color:gray;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2023/03/21/155276-810802123_large.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>
  <div class="logo">🛒 Fouad Store</div>
</header>

<div class="hero">
  <h1>CYBER GAMING STORE 🔥</h1>
  <p>أفضل خدمات فري فاير</p>
</div>

<div class="grid">
  <div class="card">💎 جواهر</div>
  <div class="card">🔥 حسابات</div>
  <div class="card">🎮 أكواد</div>
  <div class="card">⚡ تسليم سريع</div>
</div>

<a class="btn" href="https://wa.me/212705870942">
📲 اطلب عبر واتساب
</a>

<!-- 🎧 زر الصوت -->
<button class="music-btn" onclick="playMusic()">🎧 Morphine</button>

<iframe id="music" width="0" height="0"
frameborder="0" allow="autoplay"></iframe>

<script>
function playMusic(){
  document.getElementById("music").src =
  "https://www.youtube.com/embed/kSXt_zQn9Yc?start=0&end=10&autoplay=1";
}
</script>

<footer>
© Fouad Store
</footer>

</body>
</html>
