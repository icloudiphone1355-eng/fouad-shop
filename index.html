<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fouad Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  background: linear-gradient(90deg,#00ffd5,#00aaff);
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:black;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  color:#00ffd5;
  font-size:32px;
}

.hero p{
  color:#ccc;
}

/* SERVICES */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#151515;
  padding:15px;
  border-radius:12px;
  border:1px solid #00ffd5;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:#1f1f1f;
}

/* BUTTON */
.btn{
  display:block;
  width:220px;
  margin:30px auto;
  text-align:center;
  background:#25D366;
  padding:12px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  color:gray;
  padding:15px;
  font-size:12px;
}
</style>

</head>

<body>

<header>
🛒 FOUAD STORE
</header>

<div class="hero">
  <h1>مرحبا بك في متجرنا</h1>
  <p>أفضل خدمات فري فاير والجواهر والأكواد</p>
</div>

<div class="grid">

  <div class="card">🔥 حسابات فري فاير</div>
  <div class="card">💎 شحن جواهر</div>
  <div class="card">🎫 أكواد فري فاير</div>
  <div class="card">🟣 جيفات إنوي</div>
  <div class="card">💲 أرصدة إلكترونية</div>
  <div class="card">🤝 وساطة بيع وشراء</div>
  <div class="card">⚙️ تأمين الحسابات</div>
  <div class="card">⚡ سرعة في التنفيذ</div>

</div>

<a class="btn" href="https://wa.me/212705870942" target="_blank">
📲 اطلب عبر واتساب
</a>

<footer>
© Fouad Store - جميع الحقوق محفوظة
</footer>

</body>
</html>
